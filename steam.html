<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baekjoon Mini Profile</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111824;
      --panel: #1a2433;
      --panel-2: #28364b;
      --text: #dce7f5;
      --sub: #9aa9bd;
      --accent: #ff9d2f;
      --accent-soft: #ffd8a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, #2f4360 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, #3e2d22 0%, transparent 45%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .window {
      width: min(920px, 100%);
      border: 1px solid #486385;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      background: linear-gradient(180deg, #1b2838 0%, #121b29 100%);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(180deg, #415c80 0%, #30445f 100%);
      border-bottom: 1px solid #4d6c92;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .titlebar .left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #e5f4ff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(255, 157, 47, 0.9);
    }

    .status {
      color: var(--accent-soft);
      font-weight: 600;
      font-size: 12px;
    }

    .content {
      padding: 18px;
    }

    .frame-wrap {
      border: 1px solid #3f5979;
      background: #101a27;
      border-radius: 10px;
      overflow: hidden;
      padding: 20px;
    }

    .boj-card {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border: 1px solid #47658a;
      border-radius: 10px;
      background:
        linear-gradient(145deg, rgba(255, 157, 47, 0.12) 0%, transparent 40%),
        linear-gradient(180deg, #1b2a3d 0%, #162233 100%);
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 12px;
      border: 2px solid #ffaf58;
      object-fit: cover;
      background: #0d141f;
    }

    .name {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      color: #fff2df;
    }

    .handle {
      margin: 6px 0 14px;
      color: var(--sub);
      font-size: 14px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid #586f8f;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      color: #d8e7fa;
      background: #1a2b40;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button.primary {
      color: #1c1308;
      background: linear-gradient(180deg, #ffbb69 0%, #ff9d2f 100%);
      box-shadow: 0 8px 18px rgba(255, 157, 47, 0.25);
    }

    .button.secondary {
      color: #c7d8ee;
      border-color: #5b769b;
      background: #1a2b40;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .solved-badge {
      margin-top: 14px;
      width: 100%;
      max-width: 560px;
      border: 1px solid #45668c;
      border-radius: 8px;
      display: block;
    }

    .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--sub);
      font-size: 12px;
    }

    .foot a {
      color: var(--accent);
      text-decoration: none;
    }

    .foot a:hover {
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .boj-card {
        grid-template-columns: 1fr;
        text-align: center;
        justify-items: center;
      }

      .badges,
      .actions {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <section class="window">
    <div class="titlebar">
      <div class="left">
        <span class="dot"></span>
        <span>BAEKJOON MINI PROFILE</span>
      </div>
      <span class="status">SOLVING</span>
    </div>

    <div class="content">
      <div class="frame-wrap">
        <article class="boj-card">
          <img class="avatar" src="https://avatars.akamai.steamstatic.com/8c8348960281869a66dd59d08fb2112e32523b30_full.jpg" alt="Profile Avatar" />
          <div>
            <h1 class="name">사실장난임</h1>
            <p class="handle">BOJ: ssawaul</p>
            <div class="badges">
              <span class="pill">알고리즘 연습중</span>
              <span class="pill">온라인 저지</span>
              <span class="pill">Baekjoon</span>
            </div>
            <div class="actions">
              <a class="button primary" href="https://www.acmicpc.net/user/ssawaul" target="_blank" rel="noreferrer noopener">Open BOJ Profile</a>
              <a class="button secondary" href="https://solved.ac/profile/ssawaul" target="_blank" rel="noreferrer noopener">Open solved.ac</a>
            </div>
          </div>
        </article>
        <img class="solved-badge" src="http://mazassumnida.wtf/api/v2/generate_badge?boj=ssawaul" alt="Solved.ac Badge" />
      </div>

      <div class="foot">
        <span>Profile: ssawaul</span>
        <a href="https://www.acmicpc.net/user/ssawaul" target="_blank" rel="noreferrer noopener">Open Baekjoon Profile</a>
      </div>
    </div>
  </section>
</body>
</html>
