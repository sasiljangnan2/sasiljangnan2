<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Mini Profile</title>
  <style>
    :root {
      color-scheme: dark;
      --steam-bg: #101822;
      --steam-panel: #1b2838;
      --steam-panel-2: #2a475e;
      --steam-text: #c7d5e0;
      --steam-sub: #8f98a0;
      --steam-accent: #66c0f4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--steam-text);
      background:
        radial-gradient(circle at 20% 0%, #294e67 0%, transparent 38%),
        radial-gradient(circle at 80% 100%, #1d3d53 0%, transparent 40%),
        var(--steam-bg);
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .window {
      width: min(920px, 100%);
      border: 1px solid #3b5f7a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      background: linear-gradient(180deg, #1b2838 0%, #131f2d 100%);
    }

    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(180deg, #2f5975 0%, #24445b 100%);
      border-bottom: 1px solid #3f6a89;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    .titlebar .left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      color: #e5f4ff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--steam-accent);
      box-shadow: 0 0 10px rgba(102, 192, 244, 0.9);
    }

    .status {
      color: #9ad9ff;
      font-weight: 600;
      font-size: 12px;
    }

    .content {
      padding: 18px;
    }

    .frame-wrap {
      border: 1px solid #3b5f7a;
      background: #0f1a24;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 100%;
      height: 420px;
      border: 0;
      background: #0f1a24;
    }

    .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--steam-sub);
      font-size: 12px;
    }

    .foot a {
      color: var(--steam-accent);
      text-decoration: none;
    }

    .foot a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <section class="window">
    <div class="titlebar">
      <div class="left">
        <span class="dot"></span>
        <span>STEAM MINI PROFILE</span>
      </div>
      <span class="status">ONLINE</span>
    </div>

    <div class="content">
      <div class="frame-wrap">
        <iframe
          src="https://gamer2810.github.io/steam-miniprofile/?accountId=76561198360243498&interactive=true&vanityId=ssawual"
          name="steamMiniProfile"
          scrolling="no"
          allowfullscreen>
        </iframe>
      </div>

      <div class="foot">
        <span>Profile: ssawual</span>
        <a href="https://www.acmicpc.net/user/ssawaul" target="_blank" rel="noreferrer noopener">Open Baekjoon Profile</a>
      </div>
    </div>
  </section>
</body>
</html>
