name: Update Badge Cache Buster

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-badge-cache
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update badge URLs
        env:
          BADGE_SERVER_URL: ${{ secrets.BADGE_SERVER_URL }}
          BADGE_NICKNAME: ${{ secrets.BADGE_NICKNAME }}
        run: |
          python - <<'PY'
          import os
          import re
          import time
          from pathlib import Path
          from urllib.parse import quote

          readme_path = Path("README.md")
          server_url = os.environ.get("BADGE_SERVER_URL", "").strip().rstrip("/")
          nickname = os.environ.get("BADGE_NICKNAME", "").strip()

          if not server_url:
              raise SystemExit("Repository secret BADGE_SERVER_URL is required")
          if not nickname:
              raise SystemExit("Repository secret BADGE_NICKNAME is required")
          if not readme_path.exists():
              raise SystemExit("README.md was not found")

          timestamp = int(time.time())
          encoded_nickname = quote(nickname, safe="")
          badge_4p = f"{server_url}/badge/{encoded_nickname}?t={timestamp}"
          badge_3p = f"{server_url}/badge3/{encoded_nickname}?t={timestamp}"

          content = readme_path.read_text(encoding="utf-8")
          replacements = (
              (
                  r"(!\[Mahjong Soul Badge\]\()[^)]+(\))",
                  rf"\g<1>{badge_4p}\g<2>",
              ),
              (
                  r"(!\[Mahjong Soul 3P Badge\]\()[^)]+(\))",
                  rf"\g<1>{badge_3p}\g<2>",
              ),
          )

          updated = content
          replaced = 0
          for pattern, replacement in replacements:
              updated, count = re.subn(pattern, replacement, updated)
              replaced += count

          if replaced == 0:
              raise SystemExit(
                  "No supported badge Markdown was found. "
                  "Use alt text 'Mahjong Soul Badge' or 'Mahjong Soul 3P Badge'."
              )

          readme_path.write_text(updated, encoding="utf-8")
          print(f"Updated {replaced} badge URL(s) with t={timestamp}")
          PY

      - name: Commit updated README
        run: |
          if git diff --quiet -- README.md; then
            echo "README badge URLs are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: refresh badge cache"
          git push
